version: '3'

# Cross-platform variables for unified task execution
vars:
  AGENTS_SOURCE_DIR: './agents'
  COMMANDS_SOURCE_DIR: './commands'
  CLAUDE_AGENTS_DIR:
    sh: |
      if [ "{{OS}}" = "windows" ]; then
        echo "${USERPROFILE}\.claude\agents"
      else
        echo "${HOME}/.claude/agents"
      fi
  CLAUDE_COMMANDS_DIR:
    sh: |
      if [ "{{OS}}" = "windows" ]; then
        echo "${USERPROFILE}\.claude\commands"
      else
        echo "${HOME}/.claude/commands"
      fi
  PROJECT_ROOT: '{{.ROOT_DIR}}'
  TASK_BIN: '{{.ROOT_DIR}}/bin/task'

# Global environment setup
env:
  PATH: '{{.ROOT_DIR}}/bin:{{.PATH}}'

# Main tasks for agent management
tasks:
  # Core installation task - migrated from existing scripts
  install:
    desc: Install Claude agent templates and commands to ~/.claude/
    summary: |
      Installs all agent .md files from the agents directory and custom
      commands from the commands directory to the global Claude directories,
      maintaining cross-platform compatibility.
    cmds:
      - task: _create-claude-dirs
      - task: _install-agents
      - task: _install-commands
      - task: _show-success-message

  # List available and installed agents
  list:
    desc: List available agents, commands and their installation status
    summary: Show all agents and commands in the repository and indicate which are installed
    cmds:
      - task: _list-available
      - task: _list-installed

  # Clean installed agents
  clean:
    desc: Remove all installed agents and commands from ~/.claude/
    summary: Clean up the global Claude directories with confirmation
    prompt: This will remove all agents and commands from {{.CLAUDE_AGENTS_DIR}} and {{.CLAUDE_COMMANDS_DIR}}. Continue?
    cmds:
      - task: _clean-agents
      - task: _clean-commands

  # Validate agent installations
  validate:
    desc: Verify agent and command file integrity and installation status
    summary: Check that all agents and commands are properly installed and accessible
    cmds:
      - task: _validate-installation

  # Update existing agent installations
  update:
    desc: Update existing agent and command installations with latest versions
    summary: Refresh installed agents and commands with any changes from the repository
    cmds:
      - task: _update-agents
      - task: _update-commands

  # Help information
  help:
    desc: Display detailed help information for all tasks
    summary: Show comprehensive usage information and examples
    cmds:
      - task: _show-help

  # Test task for validation
  test:
    desc: Run comprehensive test suite for Taskfile migration
    summary: Execute all tests to verify installation and functionality
    cmds:
      - chmod +x test/test-taskfile.sh
      - ./test/test-taskfile.sh

  # Create workflow labels for GitHub repositories
  create-labels:
    desc: Create all necessary workflow labels in the current repository
    summary: |
      Creates standardized workflow labels used by agents for GitHub issue management.
      Labels include: requirements-ready, plan-approved, tests-planned, implementation-complete
    cmds:
      - task: _create-workflow-labels

  # Default task
  default:
    desc: Show available tasks (same as 'task --list')
    cmds:
      - task --list

  # Internal helper tasks (prefixed with _ to indicate private)
  _create-claude-dirs:
    desc: Create the Claude agents and commands directory structure
    internal: true
    cmds:
      - |
        if [ "{{OS}}" = "windows" ]; then
          mkdir -p "{{.CLAUDE_AGENTS_DIR}}" 2>/dev/null || true
          mkdir -p "{{.CLAUDE_COMMANDS_DIR}}" 2>/dev/null || true
        else
          mkdir -p "{{.CLAUDE_AGENTS_DIR}}"
          mkdir -p "{{.CLAUDE_COMMANDS_DIR}}"
        fi
    status:
      - test -d "{{.CLAUDE_AGENTS_DIR}}"
      - test -d "{{.CLAUDE_COMMANDS_DIR}}"

  _install-agents:
    desc: Copy agent files to the Claude directory
    internal: true
    cmds:
      - echo "Installing Claude Agent Templates..."
      - echo "Discovering and copying agent files to {{.CLAUDE_AGENTS_DIR}}..."
      - |
        installed_count=0
        failed_count=0
        
        # Find all .md files in agents subdirectories
        find "{{.AGENTS_SOURCE_DIR}}" -name "*.md" -type f | while read -r agent_file; do
          filename=$(basename "$agent_file")
          
          # Skip README files
          if [ "$filename" = "README.md" ]; then
            continue
          fi
          
          # Copy to global agents directory
          if cp "$agent_file" "{{.CLAUDE_AGENTS_DIR}}/"; then
            echo "✓ Installed $filename"
            installed_count=$((installed_count + 1))
          else
            echo "✗ Failed to install $filename"
            failed_count=$((failed_count + 1))
          fi
        done

  _install-commands:
    desc: Copy command files to the Claude commands directory
    internal: true
    cmds:
      - echo "Installing Claude custom commands..."
      - echo "Discovering and copying command files to {{.CLAUDE_COMMANDS_DIR}}..."
      - |
        installed_count=0
        failed_count=0

        # Find all .md files in commands directory and subdirectories
        if [ -d "{{.COMMANDS_SOURCE_DIR}}" ]; then
          find "{{.COMMANDS_SOURCE_DIR}}" -name "*.md" -type f | while read -r command_file; do
            # Preserve directory structure
            relative_path=$(echo "$command_file" | sed 's|^{{.COMMANDS_SOURCE_DIR}}/||')
            target_dir="{{.CLAUDE_COMMANDS_DIR}}/$(dirname "$relative_path")"
            filename=$(basename "$command_file")

            # Skip README files
            if [ "$filename" = "README.md" ]; then
              continue
            fi

            # Create target directory if it doesn't exist
            mkdir -p "$target_dir"

            # Copy to global commands directory
            if cp "$command_file" "$target_dir/"; then
              echo "✓ Installed command $relative_path"
              installed_count=$((installed_count + 1))
            else
              echo "✗ Failed to install command $relative_path"
              failed_count=$((failed_count + 1))
            fi
          done
        else
          echo "No commands directory found at {{.COMMANDS_SOURCE_DIR}}"
        fi

  _show-success-message:
    desc: Display installation completion message
    internal: true
    cmds:
      - |
        # Count installed files
        agent_count=$(find "{{.CLAUDE_AGENTS_DIR}}" -name "*.md" -type f | grep -v README.md | wc -l)
        command_count=0
        if [ -d "{{.CLAUDE_COMMANDS_DIR}}" ]; then
          command_count=$(find "{{.CLAUDE_COMMANDS_DIR}}" -name "*.md" -type f | grep -v README.md | wc -l)
        fi

        if [ $agent_count -eq 0 ] && [ $command_count -eq 0 ]; then
          echo "✗ No agent or command files found"
          exit 1
        fi

        echo ""
        echo "Installation complete!"
        if [ $agent_count -gt 0 ]; then
          echo "Installed $agent_count agents"
        fi
        if [ $command_count -gt 0 ]; then
          echo "Installed $command_count custom commands"
        fi
        echo ""
        echo "To use these in Claude Code:"
        echo "1. Run 'claude' to start Claude Code"
        if [ $agent_count -gt 0 ]; then
          echo "2. Use '/agents' command to see available agents"
        fi
        if [ $command_count -gt 0 ]; then
          echo "3. Use custom commands like '/git/clean-up-local' or '/git/commit'"
        fi
        echo ""

  _list-available:
    desc: List all available agents and commands in the repository
    internal: true
    cmds:
      - echo "Available agents in repository (organized by workflow stage):"
      - |
        for category_dir in "{{.AGENTS_SOURCE_DIR}}"/*; do
          if [ -d "$category_dir" ]; then
            category=$(basename "$category_dir")
            echo ""
            echo "  [$category]"
            find "$category_dir" -name "*.md" -type f | while read -r agent_file; do
              filename=$(basename "$agent_file")
              if [ "$filename" != "README.md" ]; then
                echo "    - $filename"
              fi
            done
          fi
        done
      - echo ""
      - echo "Available commands in repository:"
      - |
        if [ -d "{{.COMMANDS_SOURCE_DIR}}" ]; then
          find "{{.COMMANDS_SOURCE_DIR}}" -name "*.md" -type f | while read -r command_file; do
            filename=$(basename "$command_file")
            if [ "$filename" != "README.md" ]; then
              relative_path=$(echo "$command_file" | sed 's|^{{.COMMANDS_SOURCE_DIR}}/||')
              echo "  - /$relative_path"
            fi
          done
        else
          echo "  (no commands directory found)"
        fi

  _list-installed:
    desc: List all installed agents and commands
    internal: true
    cmds:
      - echo ""
      - echo "Installed agents in {{.CLAUDE_AGENTS_DIR}}:"
      - |
        if [ -d "{{.CLAUDE_AGENTS_DIR}}" ]; then
          find "{{.CLAUDE_AGENTS_DIR}}" -name "*.md" -type f | while read -r agent_file; do
            filename=$(basename "$agent_file")
            echo "  ✓ $filename"
          done
        else
          echo "  (no agents installed)"
        fi
      - echo ""
      - echo "Installed commands in {{.CLAUDE_COMMANDS_DIR}}:"
      - |
        if [ -d "{{.CLAUDE_COMMANDS_DIR}}" ]; then
          find "{{.CLAUDE_COMMANDS_DIR}}" -name "*.md" -type f | while read -r command_file; do
            relative_path=$(echo "$command_file" | sed 's|{{.CLAUDE_COMMANDS_DIR}}/||')
            echo "  ✓ /$relative_path"
          done
        else
          echo "  (no commands installed)"
        fi

  _clean-agents:
    desc: Remove all installed agents
    internal: true
    cmds:
      - |
        if [ -d "{{.CLAUDE_AGENTS_DIR}}" ]; then
          echo "Removing installed agents..."
          find "{{.CLAUDE_AGENTS_DIR}}" -name "*.md" -type f | while read -r agent_file; do
            filename=$(basename "$agent_file")
            if rm "$agent_file"; then
              echo "✓ Removed $filename"
            else
              echo "✗ Failed to remove $filename"
            fi
          done
          echo ""
          echo "Cleanup complete! Removed agents from {{.CLAUDE_AGENTS_DIR}}"
        else
          echo "No agents directory found at {{.CLAUDE_AGENTS_DIR}}"
        fi

  _validate-installation:
    desc: Validate agent and command installation integrity
    internal: true
    cmds:
      - echo "Validating installation..."
      - |
        # Validate agents
        if [ ! -d "{{.CLAUDE_AGENTS_DIR}}" ]; then
          echo "✗ Claude agents directory not found: {{.CLAUDE_AGENTS_DIR}}"
          exit 1
        fi

        available_agents=$(find "{{.AGENTS_SOURCE_DIR}}" -name "*.md" -type f | grep -v README.md | wc -l)
        installed_agents=$(find "{{.CLAUDE_AGENTS_DIR}}" -name "*.md" -type f | wc -l)

        echo "Available agents: $available_agents"
        echo "Installed agents: $installed_agents"

        if [ $installed_agents -eq $available_agents ]; then
          echo "✓ All agents are properly installed"
        else
          echo "⚠ Agent installation incomplete ($installed_agents/$available_agents agents installed)"
        fi

        # Validate commands
        if [ -d "{{.COMMANDS_SOURCE_DIR}}" ]; then
          if [ ! -d "{{.CLAUDE_COMMANDS_DIR}}" ]; then
            echo "✗ Claude commands directory not found: {{.CLAUDE_COMMANDS_DIR}}"
            echo "Run 'task install' to install commands"
          else
            available_commands=$(find "{{.COMMANDS_SOURCE_DIR}}" -name "*.md" -type f | grep -v README.md | wc -l)
            installed_commands=$(find "{{.CLAUDE_COMMANDS_DIR}}" -name "*.md" -type f | wc -l)

            echo "Available commands: $available_commands"
            echo "Installed commands: $installed_commands"

            if [ $installed_commands -eq $available_commands ]; then
              echo "✓ All commands are properly installed"
            else
              echo "⚠ Command installation incomplete ($installed_commands/$available_commands commands installed)"
            fi
          fi
        else
          echo "No commands directory found - commands not available"
        fi

        if [ $installed_agents -ne $available_agents ] || ([ -d "{{.COMMANDS_SOURCE_DIR}}" ] && [ ! -d "{{.CLAUDE_COMMANDS_DIR}}" ]); then
          echo ""
          echo "Run 'task install' to install missing items"
        fi

  _update-agents:
    desc: Update existing agent installations
    internal: true
    cmds:
      - echo "Updating installed agents..."
      - task: _install-agents
      - echo "Agent update complete!"

  _clean-commands:
    desc: Remove all installed commands
    internal: true
    cmds:
      - |
        if [ -d "{{.CLAUDE_COMMANDS_DIR}}" ]; then
          echo "Removing installed commands..."
          find "{{.CLAUDE_COMMANDS_DIR}}" -name "*.md" -type f | while read -r command_file; do
            relative_path=$(echo "$command_file" | sed 's|{{.CLAUDE_COMMANDS_DIR}}/||')
            if rm "$command_file"; then
              echo "✓ Removed command $relative_path"
            else
              echo "✗ Failed to remove command $relative_path"
            fi
          done
          echo ""
          echo "Command cleanup complete! Removed commands from {{.CLAUDE_COMMANDS_DIR}}"
        else
          echo "No commands directory found at {{.CLAUDE_COMMANDS_DIR}}"
        fi

  _update-commands:
    desc: Update existing command installations
    internal: true
    cmds:
      - echo "Updating installed commands..."
      - task: _install-commands
      - echo "Command update complete!"

  _show-help:
    desc: Display comprehensive help information
    internal: true
    cmds:
      - |
        echo "Claude Agent Templates - Taskfile Operations"
        echo "========================================="
        echo ""
        echo "USAGE:"
        echo "  task [command]"
        echo ""
        echo "COMMANDS:"
        echo "  install     Install all agent templates and commands to ~/.claude/"
        echo "  list        Show available and installed agents and commands"
        echo "  clean       Remove all installed agents and commands (with confirmation)"
        echo "  validate    Verify agent and command installation integrity"
        echo "  update      Update existing agent and command installations"
        echo "  help        Show this help information"
        echo ""
        echo "EXAMPLES:"
        echo "  task install              # Install all agents and commands"
        echo "  task list                 # Show agent and command status"
        echo "  task clean                # Clean up all installations"
        echo "  task validate             # Check installation integrity"
        echo ""
        echo "For more information, visit:"
        echo "https://github.com/dkoenawan/claude-agent-templates"
        echo ""
        echo "VERSION: 0.1.1"

  _create-workflow-labels:
    desc: Create standardized workflow labels for agent GitHub integration
    internal: true
    cmds:
      - echo "Creating workflow labels for agent GitHub integration..."
      - |
        # Define workflow labels with colors and descriptions
        declare -A labels
        labels["requirements-ready"]="0052cc:Requirements analysis completed and ready for architecture planning"
        labels["plan-approved"]="1d76db:Architecture plan approved and ready for test planning"
        labels["tests-planned"]="0e8a16:Test strategy completed and ready for implementation"
        labels["implementation-complete"]="5319e7:Implementation finished and ready for documentation"
        labels["blocked"]="d93f0b:Work blocked waiting for external dependency or user input"
        labels["needs-clarification"]="fbca04:Requires additional information from user before proceeding"
        
        # Check if we're in a git repository
        if ! git rev-parse --git-dir > /dev/null 2>&1; then
          echo "✗ Not in a git repository. Please run this command in a git repository."
          exit 1
        fi
        
        # Check if gh CLI is available
        if ! command -v gh > /dev/null 2>&1; then
          echo "✗ GitHub CLI (gh) is not installed. Please install it first."
          echo "Visit: https://cli.github.com/"
          exit 1
        fi
        
        # Check if we're in a GitHub repository
        if ! gh repo view > /dev/null 2>&1; then
          echo "✗ Not in a GitHub repository or not authenticated with gh CLI."
          echo "Run 'gh auth login' to authenticate."
          exit 1
        fi
        
        echo "Creating workflow labels..."
        created_count=0
        skipped_count=0
        
        for label_name in "${!labels[@]}"; do
          IFS=':' read -r color description <<< "${labels[$label_name]}"
          
          if gh label create "$label_name" --color "$color" --description "$description" 2>/dev/null; then
            echo "✓ Created label: $label_name"
            created_count=$((created_count + 1))
          else
            echo "• Skipped label: $label_name (already exists)"
            skipped_count=$((skipped_count + 1))
          fi
        done
        
        echo ""
        echo "Label creation complete!"
        echo "Created: $created_count labels"
        echo "Skipped: $skipped_count labels (already existed)"
        echo ""
        echo "These labels are now ready for use in agent workflows."